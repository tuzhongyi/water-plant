<div class="setting-map-element-manager">
  <div class="setting-map-element-tree panel">
    <hw-setting-map-list
      [load]="tree.load"
      (loaded)="tree.on.loaded($event)"
      [(selected)]="tree.selected"
    ></hw-setting-map-list>
  </div>
  <div class="setting-map-element-table">
    <div class="setting-map-element-head">
      <div class="forms">
        <div class="form-item">
          <div class="form-item-text">元素类型</div>
          <div class="form-item-value">
            <hw-select [nullable]="true" [(selected)]="table.args.type">
              <select [(ngModel)]="table.args.type">
                @for (item of source.types; track $index) {
                  <option [ngValue]="item.Value">{{ item.Name }}</option>
                }
              </select>
            </hw-select>
          </div>
        </div>
        <div class="form-item">
          <div class="form-item-text">名称</div>
          <div class="form-item-value">
            <input type="text" [(ngModel)]="table.args.name" placeholder="搜索名称" />
          </div>
        </div>
        <div class="form-item submit">
          <button class="button-border full" (click)="manager.on.search()">
            <i class="howell-icon-search2"></i>查询
          </button>
        </div>
      </div>
      <div class="button-group">
        <button class="button-border full" (click)="manager.on.create()">
          <i class="howell-icon-plus"></i>添加
        </button>
      </div>
    </div>
    <div class="setting-map-element-body">
      <hw-setting-map-element-table
        [args]="table.args"
        [load]="table.load"
      ></hw-setting-map-element-table>
    </div>
  </div>
</div>
@if (window.details.show) {
  <app-window
    [model]="window.details"
    [style]="window.details.style"
    [title]="window.details.title"
  >
    <hw-setting-map-element-details
      [args]="window.details.args"
      [data]="window.details.data"
      (close)="window.details.close()"
    ></hw-setting-map-element-details>
  </app-window>
}
