<howell-card>
  <div class="setting-index">
    <div class="setting-index-title">
      <div
        class="button"
        [class.selected]="path == SettingPath.device_search"
        (click)="changePath(SettingPath.device_search)"
      >
        设备搜索
      </div>
      <div
        class="button"
        [class.selected]="path == SettingPath.device_list"
        (click)="changePath(SettingPath.device_list)"
      >
        设备列表
      </div>
      <div
        class="button"
        [class.selected]="path == SettingPath.map"
        (click)="changePath(SettingPath.map)"
      >
        地图布控
      </div>
      <div
        class="button"
        [class.selected]="path == SettingPath.db31"
        (click)="changePath(SettingPath.db31)"
      >
        DB31元素配置
      </div>
    </div>
    <div class="setting-index-content">
      <ng-content></ng-content>
    </div>
  </div>
</howell-card>
