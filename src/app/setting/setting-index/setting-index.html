<howell-card>
  <div class="setting-index">
    <div class="setting-index-title">
      <div
        class="button"
        [class.selected]="path == SettingPath.map_element"
        (click)="changePath(SettingPath.map_element)"
      >
        地图元素
      </div>
      <div
        class="button"
        [class.selected]="path == SettingPath.map"
        (click)="changePath(SettingPath.map)"
      >
        地图布控
      </div>
    </div>
    <div class="setting-index-content">
      <ng-content></ng-content>
    </div>
  </div>
</howell-card>
