@if (model.show) {
  <div class="window-mask">
    <div class="window-background" [ngStyle]="style">
      <div class="window-content">
        @if (headable) {
          <div class="window-content-head">
            <div class="title window-content-head-title" [title]="title || ''">
              {{ title }}
            </div>
            <div class="operation">
              <a class="close-winow" (click)="closeButtonClick()" *ngIf="closeButton"
                ><i class="howell-icon-Close alert-window-close-btn"></i
              ></a>
            </div>
          </div>
        }
        @if (lineable) {
          <div class="window-content-line"></div>
        }
        <div class="window-content-body" [class.noline]="!lineable">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
}
