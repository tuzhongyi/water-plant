<div class="system-main-three-manager">
  <div
    class="system-main-three-container"
    wheel-ctrl
    [value]="config?.find?.radius ?? 0"
    (valueChange)="on.change($event)"
  >
    <hw-system-main-three-container
      [(args)]="map.args"
      [elementload]="map.load"
      [alarm]="alarm"
      (preview)="map.on.preview($event)"
      (video)="map.on.video($event)"
      (elementloaded)="map.on.loaded($event)"
      (maploaded)="map.on.maploaded($event)"
      (buildingselect)="map.building.selected = $event"
    ></hw-system-main-three-container>
  </div>

  <div class="system-main-three-state" [class.none]="map.datas.length == 0 && !state.show">
    <hw-system-main-three-state
      [title]="map.data?.Name || ''"
      [datas]="map.datas"
      (details)="on.element($event)"
    ></hw-system-main-three-state>
  </div>
</div>
