<div class="system-main">
  <div class="system-main-left">
    <div class="system-main-state">
      <hw-system-main-state-device [datas]="data.device.datas"></hw-system-main-state-device>
    </div>
    <div class="system-main-record">
      <hw-system-main-record-manager
        (playback)="on.video.playback($event)"
      ></hw-system-main-record-manager>
    </div>
  </div>
  <div class="system-main-three">
    <howell-card>
      <div class="system-main-container">
        <hw-system-main-three-manager
          (preview)="on.video.preview($event)"
        ></hw-system-main-three-manager>
      </div>
    </howell-card>
  </div>

  @if (window.video.single.show) {
    <app-window
      [model]="window.video.single"
      [style]="window.video.single.style"
      [title]="window.video.single.title"
    >
      <howell-video-player-container
        [title]="window.video.single.title"
        [autoplay]="window.video.single.autoplay"
        [cameraId]="window.video.single.cameraId"
        [mode]="window.video.single.mode"
        [begin]="window.video.single.begin"
        [end]="window.video.single.end"
        [subtitle]="window.video.single.subtitle"
      ></howell-video-player-container>
    </app-window>
  }
</div>
