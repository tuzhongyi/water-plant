<div class="system-main">
  <howell-card>
    <div class="system-main-container">
      <hw-system-main-three-manager></hw-system-main-three-manager>
      <div class="system-main-state" (click)="on.test()">
        <hw-system-main-panel
          [title]="'惠南水厂'"
          [items]="data.device.state"
        ></hw-system-main-panel>
      </div>
    </div>
  </howell-card>

  @if (window.video.show) {
    <app-window [model]="window.video" [style]="window.video.style" [title]="window.video.title">
      <howell-video-player-window
        [autoplay]="window.video.autoplay"
        [cameraId]="window.video.cameraId"
        [mode]="window.video.mode"
        [begin]="window.video.begin"
        [end]="window.video.end"
        [subtitle]="window.video.subtitle"
      ></howell-video-player-window>
    </app-window>
  }
</div>
