<howell-card>
  <div class="system-main-state-device">
    <div class="card-head"><div class="card-head-title">设备运行状态</div></div>
    <div class="card-line"></div>
    <div class="system-main-state-device-content card-body">
      <div class="system-main-state-device-chart">
        <hw-system-main-state-device-chart [data]="data"></hw-system-main-state-device-chart>
      </div>
      <div class="system-main-state-device-info">
        <div class="system-main-state-device-info-item green">
          <div class="system-main-state-device-info-item-icon"></div>
          <div class="system-main-state-device-info-item-name">在线</div>
          <div class="system-main-state-device-info-item-value">{{ data.online }}</div>
        </div>
        <div class="system-main-state-device-info-item redlight">
          <div class="system-main-state-device-info-item-icon"></div>
          <div class="system-main-state-device-info-item-name">离线</div>
          <div class="system-main-state-device-info-item-value">{{ data.offline }}</div>
        </div>
      </div>
    </div>
  </div>
</howell-card>
